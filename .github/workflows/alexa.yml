name: Alexa Skills

on:
  workflow_dispatch:
    inputs:
      deploy_bora:
        description: 'Fazer deploy da skill Bora?'
        required: true
        type: boolean
        default: true
      deploy_finances:
        description: 'Fazer deploy da skill Finances?'
        required: true
        type: boolean
        default: true

env:
  ASK_VERSION: '2.30.7'
  NODE_VERSION: '20'

jobs:
  list-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install ASK CLI
        run: npm install -g ask-cli@${{ env.ASK_VERSION }}
      - name: Configure ASK CLI
        run: |
          mkdir -p ~/.ask
          cat > ~/.ask/cli_config << EOF
          {
            "profiles": {
              "default": {
                "token": {
                  "access_token": "${{ secrets.ASK_ACCESS_TOKEN }}",
                  "refresh_token": "${{ secrets.ASK_REFRESH_TOKEN }}",
                  "token_type": "bearer"
                },
                "vendor_id": "${{ secrets.ASK_VENDOR_ID }}"
              }
            }
          }
          EOF

      - name: List Skills
        run: ask smapi list-skills-for-vendor

      - name: Validate GitHub Token
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        run: |
          echo "### 🔐 GitHub Auth Status" >> $GITHUB_STEP_SUMMARY
          gh auth status >> $GITHUB_STEP_SUMMARY 2>&1
          
          echo "### 📋 Latest Issues (dodopontocom/finances)" >> $GITHUB_STEP_SUMMARY
          echo "| ID | Status | Title | Labels | Updated |" >> $GITHUB_STEP_SUMMARY
          echo "|----|--------|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          gh issue list --repo dodopontocom/finances --limit 5 --json number,state,title,labels,updatedAt --template \
            '{{range .}}| {{.number}} | {{.state}} | {{.title}} | {{range .labels}}{{.name}} {{end}} | {{.updatedAt}} |{{"\n"}}{{end}}' >> $GITHUB_STEP_SUMMARY

      - name: Populate .env for Bora
        run: |
          cat > Bora/lambda/.env << EOF
          GITHUB_TOKEN=${{ secrets.MY_GITHUB_PAT }}
          EOF
          cat > Bora/ask-resources.json << EOF
          {
            "askcliResourcesVersion": "2020-03-31",
            "profiles": {
              "default": {
                "skillId": "amzn1.ask.skill.c6b401b2-aa7e-4553-920c-9c38028afa07",
                "skillInfrastructure": {
                  "type": "@ask-cli/hosted-skill-deployer"
                }
              }
            }
          }
          EOF

      - name: Populate .env for Finances
        run: |
          cat > Finances/lambda/.env << EOF
          GITHUB_TOKEN=${{ secrets.MY_GITHUB_PAT }}
          EOF
          cat > Finances/ask-resources.json << EOF
          {
            "askcliResourcesVersion": "2020-03-31",
            "profiles": {
              "default": {
                "skillId": "amzn1.ask.skill.488d4044-3016-473c-915f-37e50513a5e3",
                "skillInfrastructure": {
                  "type": "@ask-cli/hosted-skill-deployer"
                }
              }
            }
          }
          EOF

      - name: Deploy Bora
        if: github.event.inputs.deploy_bora == 'true'
        run: |
          cd Bora
          git config --global user.email "workflow@github.actions"
          git config --global user.name "Github Workflow"
          git init
          # Obter URL e Access Token para autenticação básica
          REPO_URL=$(ask smapi get-alexa-hosted-skill-metadata --skill-id amzn1.ask.skill.c6b401b2-aa7e-4553-920c-9c38028afa07 | jq -r '.alexaHosted.repository.url')
          ACCESS_TOKEN=$(cat ~/.ask/cli_config | jq -r '.profiles.default.token.access_token')
          
          # Injetar token na URL para evitar prompt de senha
          AUTH_URL=$(echo $REPO_URL | sed "s/https:\/\//https:\/\/x-token-auth:$ACCESS_TOKEN@/")
          
          git remote add ask "$AUTH_URL"
          git add .
          git commit -m "Deploy via GitHub Actions"
          git push ask master --force

      - name: Deploy Finances
        if: github.event.inputs.deploy_finances == 'true'
        run: |
          cd Finances
          git config --global user.email "workflow@github.actions"
          git config --global user.name "Github Workflow"
          git init
          # Obter URL e Access Token para autenticação básica
          REPO_URL=$(ask smapi get-alexa-hosted-skill-metadata --skill-id amzn1.ask.skill.488d4044-3016-473c-915f-37e50513a5e3 | jq -r '.alexaHosted.repository.url')
          ACCESS_TOKEN=$(cat ~/.ask/cli_config | jq -r '.profiles.default.token.access_token')
          
          # Injetar token na URL para evitar prompt de senha
          AUTH_URL=$(echo $REPO_URL | sed "s/https:\/\//https:\/\/x-token-auth:$ACCESS_TOKEN@/")
          
          git remote add ask "$AUTH_URL"
          git add .
          git commit -m "Deploy via GitHub Actions"
          git push ask master --force