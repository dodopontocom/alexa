name: Alexa Skills v2

on:
  workflow_dispatch:
    inputs:
      deploy_bora:
        description: '🚀 Deploy Bora?'
        required: true
        type: boolean
        default: true
      deploy_finances:
        description: '💰 Deploy Finances?'
        required: true
        type: boolean
        default: true
      build_model:
        description: '🗣️ Build Interaction Model?'
        required: true
        type: boolean
        default: true
      force_validation:
        description: '🏗️ Force Skill Validation?'
        required: true
        type: boolean
        default: false
      debug_mode:
        description: '🐞 Enable Debug Mode?'
        required: true
        type: boolean
        default: false

env:
  ASK_VERSION: '2.30.7'
  NODE_VERSION: '20'

jobs:
  deploy-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install ASK CLI
        run: npm install -g ask-cli@${{ env.ASK_VERSION }}

      - name: Configure ASK CLI
        run: |
          mkdir -p ~/.ask
          cat > ~/.ask/cli_config << EOF
          {
            "profiles": {
              "default": {
                "token": {
                  "access_token": "${{ secrets.ASK_ACCESS_TOKEN }}",
                  "refresh_token": "${{ secrets.ASK_REFRESH_TOKEN }}",
                  "token_type": "bearer"
                },
                "vendor_id": "${{ secrets.ASK_VENDOR_ID }}"
              }
            }
          }
          EOF

      # -------------------------------
      # Deploy Bora Skill
      # -------------------------------
      - name: Deploy Bora
        if: github.event.inputs.deploy_bora == 'true'
        run: |
          cd Bora

          # Criar arquivos de recursos no caminho correto
          cat > ask-resources.json << EOF
          {
            "askcliResourcesVersion": "2020-03-31",
            "profiles": {
              "default": {
                "skillId": "amzn1.ask.skill.c6b401b2-aa7e-4553-920c-9c38028afa07",
                "skillMetadata": {
                  "src": "./skill-package"
                },
                "skillInfrastructure": {
                  "type": "@ask-cli/hosted-skill-deployer"
                }
              }
            }
          }
          EOF

          cat > ask-states.json << EOF
          {
            "askcliStatesVersion": "2020-03-31",
            "profiles": {
              "default": {
                "skillId": "amzn1.ask.skill.c6b401b2-aa7e-4553-920c-9c38028afa07"
              }
            }
          }
          EOF

          git init -b master
          git config user.email "workflow@github.actions"
          git config user.name "Github Workflow"

          REPO_URL=$(ask smapi get-alexa-hosted-skill-metadata --skill-id amzn1.ask.skill.c6b401b2-aa7e-4553-920c-9c38028afa07 | jq -r '.alexaHosted.repository.url')
          REPO_URL=$(echo "$REPO_URL" | tr -d '`' | xargs)

          git remote add ask "$REPO_URL"
          git config credential.helper "!ask util git-credentials-helper --profile default"

          git add .
          git commit -m "Deploy Bora via GitHub Actions" || echo "No changes to commit"

          # Push para Hosted Skill repo
          git push ask master --force
          git push ask master:dev --force

          # Atualiza interaction model
          if [[ "${{ github.event.inputs.build_model }}" == "true" ]]; then
            echo "### 🚀 Building Bora Interaction Model"
            ask smapi set-interaction-model \
              --skill-id amzn1.ask.skill.c6b401b2-aa7e-4553-920c-9c38028afa07 \
              --stage development \
              --locale pt-BR \
              --interaction-model "$(cat skill-package/interactionModels/custom/pt-BR.json)"
          fi

          # Força validação = força build da Lambda
          if [[ "${{ github.event.inputs.force_validation }}" == "true" ]]; then
            echo "### 🏗️ Triggering Hosted Skill Build"
            ask smapi submit-skill-validation \
              --skill-id amzn1.ask.skill.c6b401b2-aa7e-4553-920c-9c38028afa07 \
              --stage development \
              --locales pt-BR || echo "Validation triggered"
          fi

          # Deploy final do skill package
          echo "### 🚀 Final Deploy via ASK CLI"
          ask deploy --ignore-hash --debug || echo "Ask deploy finished"

      # -------------------------------
      # Deploy Finances Skill
      # -------------------------------
      - name: Deploy Finances
        if: github.event.inputs.deploy_finances == 'true'
        run: |
          cd Finances

          # Criar arquivos de recursos no caminho correto
          cat > ask-resources.json << EOF
          {
            "askcliResourcesVersion": "2020-03-31",
            "profiles": {
              "default": {
                "skillId": "amzn1.ask.skill.488d4044-3016-473c-915f-37e50513a5e3",
                "skillInfrastructure": {
                  "type": "@ask-cli/hosted-skill-deployer"
                }
              }
            }
          }
          EOF

          cat > ask-states.json << EOF
          {
            "askcliStatesVersion": "2020-03-31",
            "profiles": {
              "default": {
                "skillId": "amzn1.ask.skill.488d4044-3016-473c-915f-37e50513a5e3"
              }
            }
          }
          EOF

          git init -b master
          git config user.email "workflow@github.actions"
          git config user.name "Github Workflow"

          REPO_URL=$(ask smapi get-alexa-hosted-skill-metadata --skill-id amzn1.ask.skill.488d4044-3016-473c-915f-37e50513a5e3 | jq -r '.alexaHosted.repository.url')
          REPO_URL=$(echo "$REPO_URL" | tr -d '`' | xargs)

          git remote add ask "$REPO_URL"
          git config credential.helper "!ask util git-credentials-helper --profile default"

          git add .
          git commit -m "Deploy Finances via GitHub Actions" || echo "No changes to commit"

          # Push para Hosted Skill repo
          git push ask master --force
          git push ask master:dev --force

          # Atualiza interaction model
          if [[ "${{ github.event.inputs.build_model }}" == "true" ]]; then
            echo "### 🚀 Building Finances Interaction Model"
            ask smapi set-interaction-model \
              --skill-id amzn1.ask.skill.488d4044-3016-473c-915f-37e50513a5e3 \
              --stage development \
              --locale pt-BR \
              --interaction-model "$(cat skill-package/interactionModels/custom/pt-BR.json)"
          fi

          # Força validação = força build da Lambda
          if [[ "${{ github.event.inputs.force_validation }}" == "true" ]]; then
            echo "### 🏗️ Triggering Hosted Skill Build"
            ask smapi submit-skill-validation \
              --skill-id amzn1.ask.skill.488d4044-3016-473c-915f-37e50513a5e3 \
              --stage development \
              --locales pt-BR || echo "Validation triggered"
          fi

          # Deploy final do skill package
          echo "### 🚀 Final Deploy via ASK CLI"
          ask deploy --ignore-hash --debug || echo "Ask deploy finished"
